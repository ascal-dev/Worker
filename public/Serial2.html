<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SerialMaza Posts</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.18"></script>
    <style>
        :root {
            --bg: #0b1117;
            --bg2: #0f1721;
            --card: #111b25;
            --text: #f1f5f9;
            --text2: #94a3b8;
            --accent: #38bdf8;
            --accent2: #f59e0b;
            --border: rgba(148, 163, 184, 0.18);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            overflow-x: hidden;
        }

        body {
            font-family: 'Sora', system-ui, sans-serif;
            background:
                radial-gradient(1100px 600px at 10% -10%, rgba(56, 189, 248, 0.18), transparent 60%),
                radial-gradient(900px 500px at 90% 0%, rgba(245, 158, 11, 0.18), transparent 55%),
                var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .wrap {
            max-width: 1200px;
            margin: 0 auto;
            padding: 28px 18px 60px;
        }

        header {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .brand {
            font-weight: 800;
            font-size: 1.6rem;
            letter-spacing: 0.4px;
        }

        .pill {
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 999px;
            font-size: 12px;
            color: var(--text2);
            background: rgba(15, 23, 33, 0.6);
        }

        .toolbar {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .search {
            min-width: 200px;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg2);
            color: var(--text);
            font-size: 13px;
        }

        .search::placeholder {
            color: #64748b;
        }



        .btn {
            background: var(--bg2);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
            cursor: pointer;
            transition: transform 0.2s ease, border 0.2s ease;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-1px);
            border-color: var(--accent);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-info {
            color: var(--text2);
            font-size: 12px;
            min-width: 110px;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 16px;
            margin-top: 10px;
            align-items: stretch;
        }

        .grid.search-mode {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .card {
            background: linear-gradient(180deg, rgba(17, 27, 37, 0.9), rgba(9, 15, 23, 0.9));
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .thumb {
            width: 100%;
            aspect-ratio: 16 / 9;
            height: auto;
            background: #0b121a;
            display: block;
            object-fit: cover;
        }

        .card-body {
            padding: 14px 14px 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
            justify-content: space-between;
            min-height: 78px;
        }

        .title {
            font-size: 14px;
            line-height: 1.4;
            font-weight: 600;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .meta {
            color: var(--text2);
            font-size: 11px;
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: auto;
        }

        .card-link {
            color: inherit;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            min-height: 300px;
            height: 100%;
        }

        .status {
            margin: 20px 0;
            padding: 18px;
            border-radius: 14px;
            background: rgba(15, 23, 33, 0.7);
            border: 1px dashed var(--border);
            color: var(--text2);
        }

        .spinner {
            width: 26px;
            height: 26px;
            border: 3px solid rgba(148, 163, 184, 0.2);
            border-top-color: var(--accent2);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .details {
            margin-top: 12px;
            padding: 12px;
            border-top: 1px solid var(--border);
            background: rgba(8, 13, 20, 0.65);
            display: none;
            flex-direction: column;
            gap: 10px;
        }

        .details.show {
            display: flex;
        }

        .detail-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .chip {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 999px;
            background: rgba(148, 163, 184, 0.12);
            border: 1px solid var(--border);
            color: var(--text2);
        }

        .download-btn {
            text-decoration: none;
            color: #0b1117;
            background: var(--accent2);
            padding: 6px 10px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(0, 0, 0, 0.15);
        }

        .extract-btn.loading {
            opacity: 0.75;
            pointer-events: none;
            position: relative;
        }

        footer {
            margin-top: 24px;
            color: var(--text2);
            font-size: 12px;
            text-align: center;
        }

        .calendar-pop {
            position: relative;
        }

        .calendar-panel {
            position: absolute;
            top: 42px;
            right: 0;
            width: 220px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: rgba(8, 13, 20, 0.95);
            padding: 10px;
            display: none;
            z-index: 10;
        }

        .calendar-panel.show {
            display: block;
        }

        .calendar-title {
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text2);
            margin-bottom: 6px;
        }

        .date-input {
            width: 100%;
            padding: 8px 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg2);
            color: var(--text);
            font-size: 12px;
        }

        @media (max-width: 640px) {
            .brand {
                font-size: 1.3rem;
            }

            .grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }

            .thumb {
                aspect-ratio: 16 / 9;
                height: auto;
            }

            .title {
                font-size: 12px;
                -webkit-line-clamp: 3;
            }

            .meta {
                font-size: 10px;
            }

            .card-link {
                min-height: 220px;
            }

            .card-body {
                padding: 10px 10px 8px;
                gap: 6px;
                min-height: 64px;
            }

            footer {
                margin-top: 12px;
            }
        }

        @media (min-width: 641px) and (max-width: 900px) {
            .grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        .detail-page {
            max-width: 1000px;
            margin: 0 auto;
            padding: 28px 18px 60px;
            overflow-x: hidden;
            width: 100%;
        }

        .detail-hero {
            display: grid;
            grid-template-columns: minmax(0, 320px) minmax(0, 1fr);
            gap: 18px;
            align-items: start;
            max-width: 100%;
            overflow-x: clip;
        }

        .detail-hero>div {
            min-width: 0;
        }

        .detail-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .back-btn {
            text-decoration: none;
            color: var(--text);
            background: var(--bg2);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 12px;
        }

        .section-title {
            font-size: 12px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--text2);
        }

        .detail-hero img {
            width: 100%;
            max-width: 320px;
            max-height: 420px;
            object-fit: cover;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: #0b121a;
        }

        .detail-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 8px;
            max-width: 100%;
            overflow-wrap: anywhere;
            word-break: break-word;
            line-height: 1.25;
        }

        .detail-meta {
            color: var(--text2);
            font-size: 12px;
            margin-bottom: 12px;
            max-width: 100%;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .detail-content {
            margin-top: 18px;
            color: var(--text2);
            font-size: 14px;
            line-height: 1.6;
            max-width: 100%;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .detail-links {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 0;
        }

        .detail-link-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            min-width: 0;
            max-width: 100%;
        }

        .detail-link-row>* {
            max-width: 100%;
        }

        .link-pill {
            text-decoration: none;
            color: var(--text);
            background: transparent;
            border: 1px solid var(--border);
            padding: 6px 10px;
            border-radius: 10px;
            font-size: 12px;
        }

        .source-btn {
            background: var(--bg2);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
        }

        .player-shell {
            margin-top: 16px;
            background: rgba(8, 13, 20, 0.85);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px;
            width: 100%;
            max-width: 620px;
        }

        .player-frame {
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(148, 163, 184, 0.2);
            aspect-ratio: 16 / 9;
            position: relative;
        }

        .player-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            background: #000;
            object-fit: cover;
            transition: transform 0.25s ease, object-fit 0.25s ease;
            transform-origin: center center;
        }

        .player-video.fit-cover {
            object-fit: cover;
            transform: rotate(0deg);
        }

        .player-video.fit-contain {
            object-fit: contain;
            transform: rotate(0deg);
        }

        .player-video.fit-fill {
            object-fit: fill;
            transform: rotate(0deg);
        }

        .player-video.fit-rotate {
            object-fit: contain;
            transform: rotate(90deg);
        }

        .player-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 1;
            transition: opacity 0.2s ease;
        }

        .player-overlay>* {
            pointer-events: auto;
        }

        .player-overlay>div:last-child {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .player-tap-zone {
            position: absolute;
            top: 18%;
            bottom: 18%;
            border: 0;
            background: transparent;
            color: #fff;
            pointer-events: auto;
            z-index: 3;
        }

        .player-tap-zone.tap-left {
            left: 0;
            width: 36%;
        }

        .player-tap-zone.tap-center {
            left: 36%;
            width: 28%;
        }

        .player-tap-zone.tap-right {
            right: 0;
            width: 36%;
        }

        .player-seek-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(2, 6, 23, 0.78);
            border: 1px solid rgba(148, 163, 184, 0.35);
            color: #f8fafc;
            border-radius: 999px;
            padding: 8px 12px;
            font-size: 13px;
            font-weight: 700;
            opacity: 0;
            transition: opacity 0.18s ease;
            pointer-events: none;
            z-index: 4;
        }

        .player-seek-hint.show {
            opacity: 1;
        }

        .player-overlay.is-hidden {
            opacity: 0;
        }

        .player-overlay.is-hidden>* {
            pointer-events: none;
        }

        .player-status {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            min-height: 18px;
            padding: 10px 10px 14px;
            background: linear-gradient(180deg, rgba(2, 6, 23, 0.9), rgba(2, 6, 23, 0));
            display: grid;
            grid-template-columns: 30px 1fr 30px;
            align-items: center;
            gap: 8px;
        }

        .player-top-back {
            border: 0;
            background: rgba(15, 23, 42, 0.72);
            color: #fff;
            border-radius: 999px;
            width: 28px;
            height: 28px;
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
        }

        .icon-svg {
            width: 18px;
            height: 18px;
            display: block;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            pointer-events: none;
        }

        .player-top-back.ghost {
            opacity: 0;
            pointer-events: none;
        }

        .player-status-text {
            font-size: 20px;
            font-weight: 700;
            color: #f8fafc;
            text-align: center;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }

        .player-controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            align-items: center;
            padding: 10px 10px 12px;
            background: linear-gradient(0deg, rgba(2, 6, 23, 0.9), rgba(2, 6, 23, 0.25));
        }

        .player-controls .source-btn {
            cursor: pointer;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.25);
            border-radius: 999px;
            width: 38px;
            height: 38px;
            padding: 0;
            font-weight: 600;
            line-height: 1;
            min-height: 38px;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #f8fafc;
            backdrop-filter: blur(6px);
        }

        .player-controls .source-btn:hover {
            background: rgba(56, 189, 248, 0.2);
            border-color: rgba(56, 189, 248, 0.55);
            transform: translateY(-1px);
        }

        .player-controls .source-btn.is-active {
            background: rgba(56, 189, 248, 0.28);
            border-color: rgba(56, 189, 248, 0.9);
            box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.45) inset;
        }

        .player-volume {
            width: 74px;
            accent-color: #7dd3fc;
        }

        .player-progress-wrap {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 12px 8px;
            background: rgba(2, 6, 23, 0.62);
            flex-wrap: wrap;
        }

        .player-progress {
            flex: 1;
            accent-color: #3f37ff;
            height: 3px;
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            cursor: pointer;
        }

        .player-progress::-webkit-slider-runnable-track {
            height: 3px;
            border-radius: 999px;
            background: linear-gradient(90deg,
                    #38bdf8 0%,
                    #38bdf8 var(--progress-pct, 0%),
                    rgba(226, 232, 240, 0.45) var(--progress-pct, 0%),
                    rgba(226, 232, 240, 0.45) 100%);
        }

        .player-progress::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: #7dd3fc;
            border: 0;
            margin-top: -4px;
            box-shadow: 0 0 0 2px rgba(2, 6, 23, 0.65);
        }

        .player-progress::-moz-range-track {
            height: 3px;
            border-radius: 999px;
            background: linear-gradient(90deg,
                    #38bdf8 0%,
                    #38bdf8 var(--progress-pct, 0%),
                    rgba(226, 232, 240, 0.45) var(--progress-pct, 0%),
                    rgba(226, 232, 240, 0.45) 100%);
        }

        .player-progress::-moz-range-thumb {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: #7dd3fc;
            border: 0;
            box-shadow: 0 0 0 2px rgba(2, 6, 23, 0.65);
        }

        .player-time {
            font-size: 11px;
            color: #e2e8f0;
            min-width: 36px;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .player-time.left {
            text-align: left;
        }

        .player-progress-label {
            width: 100%;
            font-size: 10px;
            color: #93c5fd;
            text-align: center;
            letter-spacing: 0.02em;
        }

        .player-controls .hide-modern {
            display: none !important;
        }

        @media (max-width: 640px) {
            .player-controls {
                gap: 8px;
                justify-content: center;
            }

            .player-controls .source-btn {
                width: 34px;
                height: 34px;
                min-height: 34px;
                font-size: 14px;
            }

            .player-volume {
                width: 74px;
            }

            .player-time {
                font-size: 10px;
            }

            .player-status-text {
                font-size: 16px;
            }

            .detail-page {
                padding-left: 12px;
                padding-right: 12px;
            }
        }

        @media (max-width: 860px) {
            .detail-hero {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="wrap" id="homeView">

                <button class="btn" id="prevBtn">Prev</button>
                <div class="page-info" id="pageInfo">Page 1</div>

        <div id="status" class="status" style="display:none;"></div>

        function buildFetchUrl(url) {
            if (!url) return '';
            if (url.includes('/api/proxy?')) return url;
            return EXTERNAL_CORS_PROXY + url;
        }

        function buildStreamProxyUrl(url) {
            if (!url) return '';
            return `${STREAM_PROXY}${encodeURIComponent(url)}`;
        }

        function showStatus(message, loading = false) {
            statusEl.style.display = 'block';
            statusEl.innerHTML = loading
                ? `<span class="spinner"></span>${message}`
                : message;
        }

        function hideStatus() {
            statusEl.style.display = 'none';
            statusEl.innerHTML = '';
        }

        function setSearchMode(enabled) {
            grid.classList.toggle('search-mode', enabled);
            prevBtn.style.display = enabled ? 'none' : '';
            nextBtn.style.display = enabled ? 'none' : '';
            pageInfo.style.display = enabled ? 'none' : '';
            if (pageInput) pageInput.style.display = enabled ? 'none' : '';
            if (goBtn) goBtn.style.display = enabled ? 'none' : '';
        }

        function decodeHtml(html) {
            const txt = document.createElement('textarea');
            txt.innerHTML = html;
            return txt.value;
        }

        function formatDate(dateStr) {
            try {
                return new Date(dateStr).toLocaleDateString(undefined, {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });
            } catch {
                return dateStr || '';
            }
        }

        function formatTime(dateStr) {
            try {
                return new Date(dateStr).toLocaleTimeString(undefined, {
                    hour: '2-digit',
                    minute: '2-digit'
                });
            } catch {
                return '';
            }
        }

        function filterPostsByDate(posts) {
            if (!state.startDate) return posts;
            return posts.filter(p => {
                const raw = p.date || p.date_gmt || '';
                const day = raw ? raw.slice(0, 10) : '';
                return day === state.startDate;
            });
        }

        function slugifyTitle(title) {
            return (title || '')
                .toLowerCase()
                .replace(/&/g, 'and')
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/(^-|-$)/g, '');
        }

        function buildUploadUrlFromFile(file) {
            if (!file) return '';
            return `https://serialmaza.xyz/wp-content/uploads/${file}`;
        }

        function getEmbeddedImage(post) {
            const media = post._embedded?.['wp:featuredmedia']?.[0];
            return buildUploadUrlFromFile(media?.media_details?.file) || '';
        }

        function extractImagesFromContent(html) {
            const imgs = new Set();
            if (!html) return [];
            const temp = document.createElement('div');
            temp.innerHTML = html;
            temp.querySelectorAll('img[src]').forEach(img => imgs.add(img.getAttribute('src')));
            return Array.from(imgs).filter(Boolean);
        }

        function extractLinksFromContent(html) {
            const links = new Set();
            if (!html) return [];
            const temp = document.createElement('div');
            temp.innerHTML = html;
            temp.querySelectorAll('a[href]').forEach(a => links.add(a.getAttribute('href')));
            const text = temp.textContent || '';
            const regex = /(https?:\/\/articleweb\.biz\/vid\/(vkspeed|okru|vkprime|multiup)\.php\?id=[A-Za-z0-9._-]+)/gi;
            let match;
            while ((match = regex.exec(text))) {
                links.add(match[1]);
            }
            return Array.from(links).filter(Boolean);
        }

        function classifyLink(url) {
            const clean = decodeHtml(url).trim();
            const idMatch = clean.match(/id=([A-Za-z0-9._-]+)/);
            const id = idMatch ? idMatch[1] : '';
            if (clean.includes('/vkspeed.php')) {
                return {
                    type: 'vkspeed',
                    id,
                    original: clean,
                    converted: id ? `https://vkspeed.com/embed-${id}.html` : clean
                };
            }
            if (clean.includes('/okru.php')) {
                return {
                    type: 'okru',
                    id,
                    original: clean,
                    converted: id ? `https://ok.ru/videoembed/${id}` : clean
                };
            }
            if (clean.includes('/vkprime.php')) {
                return {
                    type: 'vkprime',
                    id,
                    original: clean,
                    converted: id ? `https://vkprime.com/embed-${id}.html` : clean
                };
            }
            if (clean.includes('/multiup.php')) {
                return {
                    type: 'multiup',
                    id,
                    original: clean,
                    converted: id ? `https://multiup.io/en/mirror/${id}` : clean
                };
            }
            return null;
        }

        function extractMp4(html) {
            const mp4Match = html.match(/https?:\/\/[^"'\\s]+\.mp4(\?[^"'\\s]+)?/i);
            if (mp4Match && mp4Match[0]) return mp4Match[0];
            const fileMatch = html.match(/["']file["']\s*:\s*["']([^"']+\.mp4[^"']*)["']/i);
            if (fileMatch && fileMatch[1]) return fileMatch[1];
            return '';
        }

        function extractM3u8(html) {
            const m3u8Match = html.match(/https?:\/\/[^"'\\s]+\.m3u8(\?[^"'\\s]+)?/i);
            return m3u8Match && m3u8Match[0] ? m3u8Match[0] : '';
        }

        async function resolveDownload(linkItem) {
            if (!linkItem?.converted) return '';
            if (linkItem.type === 'multiup') return '';
            try {
                const res = await fetch(buildFetchUrl(linkItem.converted));
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const html = await res.text();
                if (linkItem.type === 'okru') return extractM3u8(html);
                return extractMp4(html);
            } catch (err) {
                console.error('Resolve error', err);
                return '';
            }
        }

        function renderPosts(posts) {
            if (!posts.length) {
                showStatus('No posts found. Try another page.', false);
                grid.innerHTML = '';
                return;
            }

            const filtered = filterPostsByDate(posts);
            if (!filtered.length) {
                showStatus('No posts found for selected date range.', false);
                grid.innerHTML = '';
                return;
            }

            hideStatus();
            grid.innerHTML = filtered.map((p, idx) => {
                const title = decodeHtml(p.title?.rendered || 'Untitled');
                const image = getEmbeddedImage(p);
                const date = formatDate(p.date);
                const time = formatTime(p.date);
                return `
                    <article class="card" data-index="${idx}">
                        <a class="card-link" href="Serial2.html?post=${p.id}">
                            <img class="thumb" src="${image}" alt="${title}" loading="lazy" />
                            <div class="card-body">
                                <div class="title">${title}</div>
                                <div class="meta">${date} • ${time}</div>
                            </div>
                        </a>
                    </article>
                `;
            }).join('');
        }

        function destroyExtractHls() {

                    extractHls.destroy();

        function clearExtractControlsHideTimer() {
            if (extractControlsHideTimer) {
                clearTimeout(extractControlsHideTimer);
                extractControlsHideTimer = null;
            }
        }

        function getExtractOverlayElements() {
            const video = document.getElementById('extractPlayer');
            const frame = video?.closest('.player-frame') || null;
            const overlay = frame?.querySelector('.player-overlay') || null;
            return { video, frame, overlay };
        }

        function scheduleExtractControlsAutoHide() {
            const { video, overlay } = getExtractOverlayElements();
            if (!video || !overlay) return;
            clearExtractControlsHideTimer();
            if (EXTRACT_CONTROLS_AUTO_HIDE_MS <= 0) return;
            if (video.paused || video.ended) return;
            extractControlsHideTimer = setTimeout(() => {
                overlay.classList.add('is-hidden');
            }, EXTRACT_CONTROLS_AUTO_HIDE_MS);
        }

        function showExtractControls(autoHide = true) {
            const { video, overlay } = getExtractOverlayElements();
            if (!overlay) return;
            overlay.classList.remove('is-hidden');
            clearExtractControlsHideTimer();
            if (autoHide && video && !video.paused && !video.ended) {
                scheduleExtractControlsAutoHide();
            }
        }

        function setPlayerStatus(message) {
            const statusText = document.getElementById('extractPlayerStatusText');
            if (statusText) statusText.textContent = message || 'Video Player';
        }

        function setButtonIcon(id, iconKey) {
            const el = document.getElementById(id);
            const svg = PLAYER_ICONS[iconKey];
            if (!el || !svg) return;
            el.innerHTML = svg;
        }

        function applyPlayerIcons(video) {
            setButtonIcon('playerTopBackBtn', 'backTop');
            setButtonIcon('playerBackBtn', 'rewind10');
            setButtonIcon('playerToggleBtn', video && !video.paused ? 'pause' : 'play');
            setButtonIcon('playerFwdBtn', 'forward10');
            setButtonIcon('playerMuteBtn', video && video.muted ? 'volumeOff' : 'volumeOn');
            setButtonIcon('playerSpeedBtn', 'speed');
            setButtonIcon('playerQualityBtn', 'quality');
            setButtonIcon('playerPipBtn', 'pip');
            setButtonIcon('playerFullBtn', 'fullscreen');
            setButtonIcon('playerAspectBtn', 'aspect');
            setButtonIcon('playerPortraitBtn', 'portrait');
            setButtonIcon('playerLandscapeBtn', 'landscape');
            setButtonIcon('playerLockBtn', video?.dataset.orientationLocked === '1' ? 'lockOn' : 'lockOff');
        }

        function getOrientationType() {
            try {
                const t = screen?.orientation?.type;
                if (typeof t === 'string' && t) return t;
            } catch {}
            return '';
        }

        function getEffectiveOrientation(video = null) {
            const fromDataset = String(video?.dataset?.orientationType || '').trim().toLowerCase();
            if (fromDataset) return fromDataset.includes('portrait') ? 'portrait' : 'landscape';
            const raw = getOrientationType().toLowerCase();
            if (raw.includes('portrait')) return 'portrait';
            if (raw.includes('landscape')) return 'landscape';
            return window.innerWidth >= window.innerHeight ? 'landscape' : 'portrait';
        }

        function syncOrientationButtons(video) {
            const portraitBtn = document.getElementById('playerPortraitBtn');
            const landscapeBtn = document.getElementById('playerLandscapeBtn');
            const lockBtn = document.getElementById('playerLockBtn');
            const orientation = getEffectiveOrientation(video);
            const isLocked = video?.dataset?.orientationLocked === '1';

            portraitBtn?.classList.toggle('is-active', orientation === 'portrait');
            landscapeBtn?.classList.toggle('is-active', orientation === 'landscape');
            lockBtn?.classList.toggle('is-active', isLocked);
            if (lockBtn) lockBtn.title = isLocked ? `Unlock ${orientation}` : 'Lock Orientation';
            setButtonIcon('playerLockBtn', isLocked ? 'lockOn' : 'lockOff');
        }

        function updateOrientationStatus(video) {
            const orientation = getEffectiveOrientation(video);
            const isLocked = video?.dataset?.orientationLocked === '1';
            setPlayerStatus(`Orientation ${orientation.toUpperCase()}${isLocked ? ' - LOCKED' : ' - UNLOCKED'}`);
        }

        async function lockPlayerOrientation(video, mode = 'portrait') {
            if (!video) return;
            const isPortrait = mode === 'portrait';
            const type = isPortrait ? 'portrait' : 'landscape';
            try {
                if (screen?.orientation?.lock) {
                    if (!document.fullscreenElement) {
                        const frame = video.closest('.player-frame') || video;
                        await frame.requestFullscreen?.();
                    }
                    await screen.orientation.lock(type);
                    video.dataset.orientationLocked = '1';
                    video.dataset.orientationType = type;
                    syncOrientationButtons(video);
                    updateOrientationStatus(video);
                } else {
                    setPlayerStatus('Orientation lock not supported');
                }
            } catch (err) {
                console.warn('[PLAYER] orientation lock failed:', err);
                setPlayerStatus('Orientation lock blocked by browser');
            } finally {
                syncOrientationButtons(video);
            }
        }

        async function unlockPlayerOrientation(video) {
            if (!video) return;
            try {
                if (screen?.orientation?.unlock) {
                    screen.orientation.unlock();
                }
            } catch (err) {
                console.warn('[PLAYER] orientation unlock failed:', err);
            }
            video.dataset.orientationLocked = '0';
            video.dataset.orientationType = getEffectiveOrientation(video);
            syncOrientationButtons(video);
            updateOrientationStatus(video);
        }

        function showSeekHint(message) {
            const hint = document.getElementById('playerSeekHint');
            if (!hint) return;
            hint.textContent = message;
            hint.classList.add('show');
            if (extractSeekHintTimer) clearTimeout(extractSeekHintTimer);
            extractSeekHintTimer = setTimeout(() => {
                hint.classList.remove('show');
            }, 450);
        }

        function seekBy(video, deltaSec) {
            if (!video || !Number.isFinite(deltaSec)) return;
            const duration = Number.isFinite(video.duration) ? video.duration : Infinity;
            const next = Math.min(duration, Math.max(0, (video.currentTime || 0) + deltaSec));
            video.currentTime = next;
            showSeekHint(deltaSec > 0 ? `+${deltaSec}s` : `${deltaSec}s`);
            showExtractControls(true);
        }

        function formatPlayerTime(sec) {
            if (!Number.isFinite(sec) || sec < 0) return '00:00';
            const total = Math.floor(sec);
            const m = Math.floor(total / 60);
            const s = total % 60;
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function getBufferedAhead(video) {
            if (!video || !video.buffered || video.buffered.length === 0) return 0;
            const now = Number.isFinite(video.currentTime) ? video.currentTime : 0;
            for (let i = 0; i < video.buffered.length; i += 1) {
                const start = video.buffered.start(i);
                const end = video.buffered.end(i);
                if (now >= start && now <= end) return Math.max(0, end - now);
            }
            return 0;
        }

        function getPlayerResumeMap() {
            try {
                const raw = localStorage.getItem(PLAYER_RESUME_STORE_KEY);
                const parsed = raw ? JSON.parse(raw) : {};
                return parsed && typeof parsed === 'object' ? parsed : {};
            } catch {
                return {};
            }
        }

        function setPlayerResumeMap(map) {
            try {
                localStorage.setItem(PLAYER_RESUME_STORE_KEY, JSON.stringify(map || {}));
            } catch (err) {
                console.warn('[PLAYER] resume storage failed:', err);
            }
        }

        function buildResumeKey(streamUrl) {
            return String(streamUrl || '').trim();
        }

        function saveResumePoint(video) {
            if (!video) return;
            const key = buildResumeKey(video.dataset.streamKey);
            if (!key) return;
            const duration = Number.isFinite(video.duration) ? video.duration : 0;
            const current = Number.isFinite(video.currentTime) ? video.currentTime : 0;
            if (duration <= 0 || current < PLAYER_RESUME_MIN_SEC || current >= Math.max(0, duration - 3)) return;
            const now = Date.now();
            const last = Number(video.dataset.lastResumeSaveAt || '0');
            if (now - last < PLAYER_RESUME_SAVE_INTERVAL_MS) return;
            video.dataset.lastResumeSaveAt = String(now);
            const map = getPlayerResumeMap();
            map[key] = { t: Math.floor(current), d: Math.floor(duration), u: now };
            const keys = Object.keys(map);
            if (keys.length > PLAYER_RESUME_MAX_ENTRIES) {
                keys.sort((a, b) => (map[b]?.u || 0) - (map[a]?.u || 0))
                    .slice(PLAYER_RESUME_MAX_ENTRIES)
                    .forEach(k => delete map[k]);
            }
            setPlayerResumeMap(map);
        }

        function clearResumePoint(streamUrl) {
            const key = buildResumeKey(streamUrl);
            if (!key) return;
            const map = getPlayerResumeMap();
            if (map[key]) {
                delete map[key];
                setPlayerResumeMap(map);
            }
        }

        function tryRestoreResume(video, label = 'Stream') {
            if (!video || video.dataset.resumeApplied === '1') return;
            const key = buildResumeKey(video.dataset.streamKey);
            if (!key) return;
            const duration = Number.isFinite(video.duration) ? video.duration : 0;
            if (duration <= 0) return;
            const saved = getPlayerResumeMap()[key];
            if (!saved || !Number.isFinite(saved.t)) {
                video.dataset.resumeApplied = '1';
                return;
            }
            const resumeAt = Math.min(Math.max(0, Number(saved.t)), Math.max(0, duration - 2));
            if (resumeAt < PLAYER_RESUME_MIN_SEC) {
                video.dataset.resumeApplied = '1';
                return;
            }
            video.currentTime = resumeAt;
            video.dataset.resumeApplied = '1';
            setPlayerStatus(`Resumed ${label} at ${formatPlayerTime(resumeAt)}`);
        }

        function updateQualityControl(hlsInstance = null) {
            const quality = document.getElementById('playerQuality');
            if (!quality) return;
            if (!hlsInstance || !Array.isArray(hlsInstance.levels) || !hlsInstance.levels.length) {
                quality.innerHTML = '<option value="auto">Quality Auto</option>';
                quality.disabled = true;
                const btn = document.getElementById('playerQualityBtn');
                if (btn) btn.title = 'Quality: Auto';
                return;
            }
            const options = hlsInstance.levels.map((lvl, idx) => {
                const h = Number.isFinite(lvl?.height) ? lvl.height : 0;
                const b = Number.isFinite(lvl?.bitrate) ? lvl.bitrate : 0;
                const label = h > 0 ? `${h}p` : `${Math.round(b / 1000)}kbps`;
                return `<option value="${idx}">${label}</option>`;
            }).join('');
            quality.innerHTML = `<option value="auto">Quality Auto</option>${options}`;
            quality.disabled = false;
            quality.value = 'auto';
            const btn = document.getElementById('playerQualityBtn');
            if (btn) btn.title = 'Quality: Auto';

                }
                if (key === 'arrowright') {
                    e.preventDefault();
                    video.currentTime = (video.currentTime || 0) + 5;
                    showExtractControls(true);
                    return;
                }
                if (key === 'j') {
                    e.preventDefault();
                    seekBy(video, -10);
                    return;
                }
                if (key === 'l') {

        function updateExtractPlayerProgress() {
            const video = document.getElementById('extractPlayer');
            const progress = document.getElementById('extractPlayerProgress');
            const curEl = document.getElementById('extractPlayerCurrent');
            const durEl = document.getElementById('extractPlayerDuration');
            const completedEl = document.getElementById('extractPlayerCompleted');
            if (!video || !progress) return;
            const duration = Number.isFinite(video.duration) ? video.duration : 0;
            const current = Number.isFinite(video.currentTime) ? video.currentTime : 0;
            const pct = duration > 0 ? (current / duration) * 100 : 0;
            const boundedPct = Math.max(0, Math.min(100, pct));
            progress.value = String(boundedPct);
            progress.style.setProperty('--progress-pct', `${boundedPct}%`);
            if (curEl) curEl.textContent = formatPlayerTime(current);
            if (durEl) durEl.textContent = formatPlayerTime(duration);
            if (completedEl) completedEl.textContent = `Completed: ${Math.floor(boundedPct)}%`;
        }

        function seekVideoTo(video, targetSec) {
            if (!video || !Number.isFinite(targetSec)) return;
            if (typeof video.fastSeek === 'function') {
                try {
                    video.fastSeek(targetSec);
                    return;
                } catch {
                    // fallback below
                }
            }
            video.currentTime = targetSec;
        }

        function seekToProgress(video, progressEl, clientX) {
            if (!video || !progressEl) return;
            const duration = Number.isFinite(video.duration) ? video.duration : 0;
            const rect = progressEl.getBoundingClientRect();
            if (!rect.width) return;
            const x = Math.min(rect.right, Math.max(rect.left, clientX));
            const pct = (x - rect.left) / rect.width;
            if (duration > 0) {
                seekVideoTo(video, duration * pct);
            } else {
                video.dataset.pendingSeekPct = String(Math.max(0, Math.min(1, pct)));
            }
            updateExtractPlayerProgress();
            video.play().catch(() => {});
            showExtractControls(true);
        }

        function applyPendingSeek(video) {
            if (!video) return;
            const pending = Number(video.dataset.pendingSeekPct || '');
            const duration = Number.isFinite(video.duration) ? video.duration : 0;
            if (!Number.isFinite(pending) || duration <= 0) return false;
            seekVideoTo(video, duration * Math.max(0, Math.min(1, pending)));
            delete video.dataset.pendingSeekPct;
            video.play().catch(() => {});
            return true;
        }

        function setPlayerAspectMode(video, mode) {
            if (!video) return;
            const modes = ['fit-cover', 'fit-contain', 'fit-fill', 'fit-rotate'];
            modes.forEach(cls => video.classList.remove(cls));
            const next = modes.includes(mode) ? mode : 'fit-cover';
            video.classList.add(next);
            video.dataset.aspectMode = next;
            const labelMap = {
                'fit-cover': 'Aspect: Cover',
                'fit-contain': 'Aspect: Contain',
                'fit-fill': 'Aspect: Fill',
                'fit-rotate': 'Aspect: Rotate'
            };
            const btn = document.getElementById('playerAspectBtn');
            if (btn) btn.title = labelMap[next] || 'Aspect';
        }

        function cyclePlayerAspectMode(video) {
            if (!video) return;
            const order = ['fit-cover', 'fit-contain', 'fit-fill', 'fit-rotate'];
            const current = video.dataset.aspectMode || 'fit-cover';
            const idx = order.indexOf(current);
            const next = order[(idx + 1) % order.length];
            setPlayerAspectMode(video, next);
            setPlayerStatus(`Aspect ${next.replace('fit-', '').toUpperCase()}`);
            showExtractControls(true);
        }

        function seekFromFramePointer(video, frame, clientX, clientY) {
            const progress = document.getElementById('extractPlayerProgress');
            if (!video || !frame || !progress) return false;
            const progressRect = progress.getBoundingClientRect();
            const frameRect = frame.getBoundingClientRect();
            const x = Number(clientX);
            const y = Number(clientY);
            if (!Number.isFinite(x) || !Number.isFinite(y)) return false;

            const withinX = x >= progressRect.left && x <= progressRect.right;
            const withinY = y >= (progressRect.top - 12) && y <= (progressRect.bottom + 12);
            const inFrame = x >= frameRect.left && x <= frameRect.right && y >= frameRect.top && y <= frameRect.bottom;
            if (!(inFrame && withinX && withinY)) return false;

            seekToProgress(video, progress, x);
            return true;
        }

        function playExtractStream(rawUrl, label = 'Stream') {
            const video = document.getElementById('extractPlayer');
            if (!video || !rawUrl) return;

            const streamUrl = decodeHtml(rawUrl).trim();
            const isHls = /\.m3u8($|\?)/i.test(streamUrl);
            const proxyUrl = buildStreamProxyUrl(streamUrl);
            extractRetryWithProxy = false;
            video.dataset.streamKey = buildResumeKey(streamUrl);
            video.dataset.streamLabel = label;
            video.dataset.resumeApplied = '0';
            video.dataset.lastResumeSaveAt = '0';

            destroyExtractHls();
            video.pause();
            video.removeAttribute('src');
            video.load();
            updateQualityControl(null);

            setPlayerStatus(`Loading ${label}...`);
            showExtractControls(false);
            console.log('[PLAYER] playExtractStream:', { label, streamUrl, isHls });

            if (isHls && window.Hls && Hls.isSupported()) {
                extractHls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: false,
                    backBufferLength: 90,
                    maxBufferLength: 90,
                    maxMaxBufferLength: 180,
                    maxBufferHole: 0.5,
                    startFragPrefetch: true,
                    manifestLoadingMaxRetry: 6,
                    levelLoadingMaxRetry: 6,
                    fragLoadingMaxRetry: 8,
                    fragLoadingRetryDelay: 1000,
                    fragLoadingMaxRetryTimeout: 15000
                });
                extractHls.on(Hls.Events.MANIFEST_PARSED, () => {
                    updateQualityControl(extractHls);
                    setPlayerStatus(`Playing ${label}`);
                    video.play().catch(err => console.error('[PLAYER] hls autoplay blocked:', err));
                });
                extractHls.on(Hls.Events.LEVEL_SWITCHED, () => {
                    const quality = document.getElementById('playerQuality');
                    if (!quality) return;
                    quality.value = extractHls.autoLevelEnabled ? 'auto' : String(extractHls.currentLevel);
                    const label = quality.value === 'auto'
                        ? 'Auto'
                        : (quality.options[quality.selectedIndex]?.text || 'Manual');
                    const qBtn = document.getElementById('playerQualityBtn');
                    if (qBtn) qBtn.title = `Quality: ${label}`;
                });
                extractHls.on(Hls.Events.ERROR, (evt, data) => {
                    console.error('[PLAYER] hls error:', data);
                    if (data && data.fatal) {
                        setPlayerStatus('HLS error. Trying recovery...');
                        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                            extractHls.startLoad();
                        } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                            extractHls.recoverMediaError();
                        } else {
                            destroyExtractHls();
                            video.src = proxyUrl;
                            video.play().catch(() => {});
                        }
                    }
                });
                extractHls.loadSource(proxyUrl);
                extractHls.attachMedia(video);
                return;
            }

            const sourceToUse = isHls ? proxyUrl : streamUrl;
            video.src = sourceToUse;
            video.play().then(() => {
                setPlayerStatus(`Playing ${label}`);
            }).catch(err => {
                console.error('[PLAYER] native play error:', err);
                setPlayerStatus('Tap Play to start.');
            });
        }

                                <div class="player-controls">
                                    <button id="playerBackBtn" class="source-btn" type="button" aria-label="Back 10 seconds" title="Back 10s"></button>
                                    <button id="playerToggleBtn" class="source-btn" type="button" aria-label="Play" title="Play/Pause"></button>
                                    <button id="playerFwdBtn" class="source-btn" type="button" aria-label="Forward 10 seconds" title="Forward 10s"></button>
                                    <button id="playerMuteBtn" class="source-btn" type="button" aria-label="Mute" title="Mute/Unmute"></button>
                                    <input id="playerVolume" class="player-volume" type="range" min="0" max="1" step="0.05" value="1" />
                                    <button id="playerSpeedBtn" class="source-btn" type="button" aria-label="Playback Speed" title="Playback Speed"></button>
                                    <button id="playerQualityBtn" class="source-btn" type="button" aria-label="Quality" title="Quality"></button>
                                    <button id="playerPipBtn" class="source-btn" type="button" aria-label="Picture in Picture" title="Picture in Picture"></button>
                                    <button id="playerFullBtn" class="source-btn" type="button" aria-label="Fullscreen" title="Fullscreen"></button>
                                    <button id="playerAspectBtn" class="source-btn" type="button" aria-label="Aspect Mode" title="Aspect: Cover"></button>
                                    <button id="playerPortraitBtn" class="source-btn" type="button" aria-label="Portrait" title="Portrait"></button>
                                    <button id="playerLandscapeBtn" class="source-btn" type="button" aria-label="Landscape" title="Landscape"></button>
                                    <button id="playerLockBtn" class="source-btn" type="button" aria-label="Lock Orientation" title="Lock Orientation"></button>
                                    <select id="playerSpeed" class="source-btn hide-modern">
                                        <option value="0.75">0.75x</option>
                                        <option value="1" selected>1x</option>
                                        <option value="1.25">1.25x</option>
                                        <option value="1.5">1.5x</option>
                                        <option value="2">2x</option>
                                    </select>
                                    <select id="playerQuality" class="source-btn hide-modern">
                                        <option value="auto">Quality Auto</option>
                                    </select>
                                    <button id="playerPlayBtn" class="source-btn hide-modern" type="button">Play</button>
                                    <button id="playerPauseBtn" class="source-btn hide-modern" type="button">Pause</button>
                                    <a class="source-btn hide-modern" target="_blank" rel="noopener" href="${TEST_STREAM_URL}">Open Direct</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            initExtractPlayerUi();
            playExtractStream(TEST_STREAM_URL, 'Given HLS');
        }
        function renderDetail(post, mappedLinks, contentImages) {
            const title = decodeHtml(post.title?.rendered || 'Untitled');
            const date = formatDate(post.date);
            const time = formatTime(post.date);
            const fullDate = (() => {
                try {
                    return new Date(post.date).toLocaleDateString(undefined, {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric'
                    });
                } catch {
                    return post.date || '';
                }
            })();
            const image = getEmbeddedImage(post);
            const content = post.content?.rendered || '';
            const plain = decodeHtml(content).replace(/<[^>]+>/g, '').trim();

            detailView.innerHTML = `
                <div class="detail-header">
                    <a class="back-btn" href="Serial2.html">Back</a>
                    <div class="section-title">Post Details</div>
                </div>
                <div class="detail-hero"> 
                                    <img src="${image}" alt="${title}" />
                                    <div>
                                        <div class="detail-title">${title}</div>
                                        <div class="detail-meta">${date} • ${fullDate} at ${time}</div>
                                        <div class="detail-content">${plain || 'No details available.'}</div>
                                
                                        <div class="detail-links">
                                            <div class="section-title">Player Links</div>
                                
                                            ${mappedLinks.length ? mappedLinks.map(item => `
                                                <div class="detail-link-row">
                                                    <a class="source-btn" href="${item.converted}" target="_blank" rel="noopener">
                                                        ${item.type.toUpperCase()} Player Link
                                                    </a>
                                
                                                    ${item.type === 'okru' ? `
                                                        <button class="source-btn extract-btn"
                                                            onclick="openOKRUExtract('${item.converted}', this)">
                                                            Extract
                                                        </button>
                                                    ` : ``}
                                                </div>
                                            `).join('') : `<span class="meta">No supported links found.</span>`}
                                
                                        </div>
                                
                                        ${contentImages.length ? `
                                            <div class="detail-links">
                                                <div class="detail-meta">Images</div>
                                                <div class="detail-link-row">
                                                    ${contentImages.slice(0, 8).map(src => `
                                                        <img class="thumb" src="${src}" alt="Post image" loading="lazy"
                                                        style="height:120px;width:auto;border-radius:10px;" />
                                                    `).join('')}
                                                </div>
                                            </div>
                                        ` : ``}
                                
                                    </div>
                                </div>
            `;
        }

        async function loadDetail(postId) {
            showStatus('Loading post...', true);
            try {
                const url = `https://serialmaza.xyz/wp-json/wp/v2/posts/${postId}?_embed=1`;
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const post = await res.json();
                const rawLinks = extractLinksFromContent(post.content?.rendered || '');
                const mapped = rawLinks.map(classifyLink).filter(Boolean);
                const contentImages = extractImagesFromContent(post.content?.rendered || '');
                hideStatus();
                homeView.style.display = 'none';
                detailView.style.display = 'block';
                renderDetail(post, mapped, contentImages);
            } catch (err) {
                console.error(err);
                showStatus('Failed to load post details.', false);
            }
        }
        
        async function extractOKru(url) {
          console.log('[OKRU] extractOKru start:', url);

          const proxyUrl = buildStreamProxyUrl(url);
          console.log('[OKRU] proxy request:', proxyUrl);
          const res = await fetch(proxyUrl);
          console.log('[OKRU] fetch status:', res.status, res.statusText);
          const html = await res.text();
          console.log('[OKRU] html length:', html.length);
        
          const match = html.match(/data-options="([^"]+)"/);
          if (!match) {
            console.warn('[OKRU] data-options not found in response HTML');
            return null;
          }
        
          let options = match[1]
            .replace(/&quot;/g, '"')
            .replace(/&amp;/g, '&');
          console.log('[OKRU] options string length:', options.length);
        
          const optionsJson = JSON.parse(options);
          const metadata = JSON.parse(optionsJson.flashvars.metadata);
          console.log('[OKRU] metadata parsed:', {
            id: metadata?.movie?.id,
            title: metadata?.movie?.title,
            videos: Array.isArray(metadata?.videos) ? metadata.videos.length : 0
          });
        
          const result = {
            id: metadata.movie.id,
            title: metadata.movie.title,
            duration: metadata.movie.duration,
            poster: metadata.movie.poster,
            page: metadata.movie.url,
            hls: metadata.hlsManifestUrl,
            videos: {}
          };
        
          metadata.videos.forEach(v => {
            result.videos[v.name] = v.url;
          });
          console.log('[OKRU] final extracted result:', result);
        
          return result;
        }

        async function loadPage(page) {
            if (state.loading) return;
            state.loading = true;
            showStatus('Loading latest posts...', true);
            prevBtn.disabled = true;
            nextBtn.disabled = true;

            try {
                const searchMode = Boolean(state.query);
                const params = new URLSearchParams({
                    per_page: searchMode ? 100 : state.perPage,
                    page: searchMode ? 1 : page,
                    _embed: '1'
                });
                if (searchMode) params.set('search', state.query);
                const url = `https://serialmaza.xyz/wp-json/wp/v2/posts?${params.toString()}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                const total = parseInt(res.headers.get('X-WP-TotalPages') || '1', 10);
                state.totalPages = searchMode ? 1 : (Number.isFinite(total) ? total : 1);
                state.page = searchMode ? 1 : page;

                const posts = await res.json();
                state.lastPosts = posts;
                renderPosts(posts);
            } catch (err) {
                console.error(err);
                showStatus('Failed to load posts from WP JSON. Please try again.', false);
                grid.innerHTML = '';
            } finally {
                state.loading = false;
                pageInfo.textContent = `Page ${state.page} of ${state.totalPages}`;
                prevBtn.disabled = state.page <= 1;
                nextBtn.disabled = state.page >= state.totalPages;
                if (pageInput) pageInput.value = String(state.page);
                setSearchMode(Boolean(state.query));
            }
        }

        function runSearch() {
            state.query = (searchInput.value || '').trim();
            state.page = 1;
            loadPage(1);
        }

        function clearSearch() {
            searchInput.value = '';
            state.query = '';
            state.startDate = '';
            state.endDate = '';
            state.page = 1;
            loadPage(1);
            if (startDateInput) startDateInput.value = '';
        }

        function applyDateFilter() {
            state.startDate = (startDateInput.value || '').trim();
            renderPosts(state.lastPosts || []);
        }


        function goToPage() {
            const p = parseInt(pageInput.value, 10);
            if (!p) return;
            const target = Math.max(1, Math.min(state.totalPages, p));
            loadPage(target);
        }

        prevBtn.addEventListener('click', () => {
            if (state.page > 1) loadPage(state.page - 1);
        });

        nextBtn.addEventListener('click', () => {
            if (state.page < state.totalPages) loadPage(state.page + 1);
        });

        searchBtn.addEventListener('click', runSearch);
        clearBtn.addEventListener('click', clearSearch);
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') runSearch();
        });


        goBtn.addEventListener('click', goToPage);
        pageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') goToPage();
        });

        calendarToggle.addEventListener('click', () => {
            calendarPanel.classList.toggle('show');
            if (calendarPanel.classList.contains('show') && startDateInput) {
                startDateInput.focus();
            }
        });

        startDateInput.addEventListener('change', applyDateFilter);
        if (playTestBtn) playTestBtn.addEventListener('click', openTestPlayer);

        const params = new URLSearchParams(window.location.search);
        const postId = params.get('post');
        if (postId) {
            loadDetail(postId);
        } else {
            loadPage(1);
        }
    </script>
